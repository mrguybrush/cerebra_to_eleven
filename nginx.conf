user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections 768;
}



http {
    # To proxy-forward to the host-system, not the localhost inside the docker container
    #  upstream host_service {
    #    server host.docker.internal:5000;
    # }

    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;

    server {
        listen 80;
        location / {
            root /usr/share/nginx/html/cerebra;
            index index.html index.htm;
            try_files $uri $uri/ /index.html =404;
        }

        # index.html references the content-hashed JS/CSS bundle filenames
        # from the build that produced it - if the browser caches index.html
        # itself, a redeploy becomes invisible (it keeps requesting the OLD
        # bundle names). The hashed bundles are safe to cache aggressively
        # (new build = new filename); index.html must never be cached.
        # try_files' internal fallback to /index.html re-enters location
        # matching, so this also covers Angular's client-side routes.
        location = /index.html {
            root /usr/share/nginx/html/cerebra;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }


        location /api {
            # nginx default (1MB) is too small for Voice-Recording-Uploads
            # (MP3/WAV) - the actual size cap for the underlying files lives
            # in the browser/Flask, this just stops nginx itself from
            # rejecting the request early.
            client_max_body_size 50M;
            # Without a resolver, nginx resolves "flask-app" to an IP ONCE
            # at startup and caches it for the worker's lifetime. When only
            # flask-app gets rebuilt/recreated (new container = new IP on
            # the docker network) without also restarting angular-app,
            # nginx keeps proxying to the now-dead old IP -> every /api
            # call 502s, which looked like "all poses/programs/groups are
            # gone" even though the data was untouched. Using a variable
            # here forces nginx to re-resolve via Docker's embedded DNS
            # (127.0.0.11) on each request instead of caching it once.
            resolver 127.0.0.11 valid=10s;
            # set MUST come before "rewrite ... break" - break stops the
            # whole rewrite-module directive chain (set is also part of
            # that module), so a set placed AFTER break never runs and the
            # variable stays empty ("invalid URL prefix" on every request -
            # verified by isolated testing against a throwaway nginx
            # container on the real docker network before deploying this).
            set $flask_upstream flask-app:5000;
            rewrite ^/api/(.*)$ /$1 break;
            # The "http://" scheme must stay a LITERAL part of proxy_pass
            # (not inside the variable) - putting the whole URL incl.
            # scheme into the variable also produces "invalid URL prefix".
            proxy_pass http://$flask_upstream;
        }
    }
}

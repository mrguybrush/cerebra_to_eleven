<div class="row mt-4">
    <div class="row pink-corner-frame w-100">
        <div class="main col-sm-9 col-xl-10">
            <div class="row pt-2 mt-2">
                <div class="col-6 text-right">
                    <span class="align-middle"> {{ 'voiceAssistant.chats' | translate }} </span>
                </div>
                <div class="col-auto pr-0 pl-0">
                    <a
                        class="toggle-button"
                        id="personality-description-toggle-voice-assistant"
                        data-test="TGL_Chat"
                        [routerLink]="['chat']">
                        <img
                            [src]="'../../assets/toggle-switch-right.png'"
                            [attr.alt]="'voiceAssistant.chatsBackAlt' | translate" />
                    </a>
                </div>
                <div class="col text-left">
                    <span class="align-middle">{{ 'voiceAssistant.persona' | translate }}</span>
                </div>
            </div>
            <div class="row mt-3 content-window">
                <div class="col">
                    <textarea
                        id="textarea-personality"
                        data-test="TXT_Peronality"
                        class="form-control p-3 mb-4"
                        rows="16"
                        [placeholder]="'voiceAssistant.personaNamePlaceholder' | translate"
                        [(ngModel)]="textAreaContent"
                        (input)="updateDescription()">
                        {{personality?.description ?? ('voiceAssistant.personaNotFound' | translate)}}
                    </textarea>
                </div>
            </div>
        </div>
        <div class="col-sm-3 col-xl-2 p-0">
            <app-va-personality-sidebar-right class="m-0">
            </app-va-personality-sidebar-right>
        </div>
    </div>
</div>
